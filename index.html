    <main id="app">

                        <div class="terminal-line">

                            <span class="command typing-animation">echo "hello world"</span>

                        <div class="terminal-output fade-in-output">hello world</div>
                        <div class="terminal-line input-line">

    </div>


    <!--JS Functions -->
    <script src="assets/js/app.js?v=20260308"></script>
    <script src="assets/js/main.js?v=20260308"></script>
    
    <script>
        // Terminal interactivo
        const terminalInput = document.getElementById('terminal-input');
        const terminalBody = document.getElementById('terminal-body');
        
        // Enfocar el input cuando se hace clic en el terminal
        terminalBody.addEventListener('click', function() {
            terminalInput.focus();
        });
        
        // Manejar el enter
        terminalInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = terminalInput.value.trim().toLowerCase();
                
                // Crear línea con el comando ingresado
                const inputLine = document.querySelector('.input-line');
                const commandLine = document.createElement('div');
                commandLine.className = 'terminal-line';
                commandLine.innerHTML = `<span class="prompt">$</span><span class="command">${terminalInput.value}</span>`;
                
                // Insertar antes de la línea de input
                terminalBody.insertBefore(commandLine, inputLine);
                
                // Procesar comando
                if (command === 'pascuala') {
                    const output = document.createElement('div');
                    output.className = 'terminal-output';
                    output.textContent = 'Redirigiendo al horario de Pascuala...';
                    terminalBody.insertBefore(output, inputLine);
                    
                    // Redirigir después de un breve delay
                    setTimeout(() => {
                        window.location.href = 'horario.html';
                    }, 800);
                } else if (command === 'blog') {
                    const output = document.createElement('div');
                    output.className = 'terminal-output';
                    output.textContent = 'Abriendo blog...';
                    terminalBody.insertBefore(output, inputLine);
                    
                    // Redirigir después de un breve delay
                    setTimeout(() => {
                        window.location.href = 'blog.html';
                    }, 800);
                } else if (command === 'help') {
                    const output = document.createElement('div');
                    output.className = 'terminal-output';
                    output.innerHTML = 'Comandos disponibles:<br>- pascuala: Ver horario escolar<br>- blog: Ver posts del blog<br>- help: Mostrar esta ayuda<br>- clear: Limpiar terminal';
                    terminalBody.insertBefore(output, inputLine);
                } else if (command === 'clear') {
                    // Limpiar todo excepto la línea de input
                    const lines = terminalBody.querySelectorAll('.terminal-line:not(.input-line), .terminal-output');
                    lines.forEach(line => line.remove());
                } else if (command !== '') {
                    const output = document.createElement('div');
                    output.className = 'terminal-output terminal-error';
                    output.textContent = `comando no encontrado: ${command}. Escribe 'help' para ver comandos disponibles.`;
                    terminalBody.insertBefore(output, inputLine);
                }
                
                // Limpiar input
                terminalInput.value = '';
                
                // Scroll al final
                terminalBody.scrollTop = terminalBody.scrollHeight;
            }
        });
        
        // Mantener el foco en el input
        terminalInput.addEventListener('blur', function() {
            setTimeout(() => terminalInput.focus(), 0);
        });
    </script>
